<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="UTF-8">
	<link href="styles.css" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title>Vstupní test</title>
</head>

<body>
	<h1>PRAKTICKÁ ČÁST</h1>
	<div class="search-container">
		<input type="text" id="query" placeholder="Search...">
		<span class="search-icon" onclick="search()">&#128269;</span>
		<div id="suggestions"></div>
	</div>
	<div class="buttons">
		<button onclick="downloadResults()">Download Results</button>
	</div>

	<div id="results"></div>

	<script>
		let searchResults = [];

		const queryInput = document.getElementById('query');

		queryInput.addEventListener('keypress', function(event) {
			if (event.key === 'Enter') {
				search();
			}
		});

		queryInput.addEventListener('focus', () => showSuggestions(queryInput.value));
		queryInput.addEventListener('input',  () => showSuggestions(queryInput.value));
		queryInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideSuggestions(); });
		queryInput.addEventListener('blur', () => setTimeout(hideSuggestions, 150));

		async function search() {
			const query = queryInput.value;
			if (!query.trim()) {
				alert('Zadejte prosím svůj dotaz.');
				return;
			}

			const resultsDiv = document.getElementById('results');
			resultsDiv.innerHTML = '<div style="color: #666; margin-top: 20px;">Searching...</div>';

			// network delay (500ms) for realistic UX
			await new Promise(resolve => setTimeout(resolve, 500));

			searchResults = [
				{
					title: `${query} - Wikipedia, the free encyclopedia`,
					link: `https://en.wikipedia.org/wiki/${encodeURIComponent(query)}`,
					snippet: `Discover the history, geography, and cultural impact of ${query} on Wikipedia, the free collaborative encyclopedia.`
				},
				{
					title: `Official Guide to ${query} - Travel and Tourism`,
					link: `https://www.visit${query.toLowerCase().replace(/[^a-z0-9]/g, '')}.com`,
					snippet: `Plan your trip to explore ${query}. Find the best hotels, top attractions, local events, and travel tips from the official tourist board.`
				},
				{
					title: `Latest News and Updates on ${query}`,
					link: `https://www.google.com/search?q=${encodeURIComponent(query)}&tbm=nws`,
					snippet: `Read breaking news, in-depth reports, video coverage, and analysis about ${query} from leading international news outlets.`
				},
				{
					title: `Top 10 Things to Do and See in ${query}`,
					link: `https://www.tripadvisor.com/Search?q=${encodeURIComponent(query)}`,
					snippet: `Check out the best sights, guided tours, outdoor activities, and highly-rated restaurants in ${query} as recommended by travelers.`
				}
			];

			// Save query
			sessionStorage.setItem('lastQuery', query);
			sessionStorage.setItem('lastResults', JSON.stringify(searchResults));

			// Save query to history
			addToHistory(query);
			hideSuggestions();

			displayResults(searchResults);
		}

		function displayResults(results) {
			const resultsDiv = document.getElementById('results');
			resultsDiv.innerHTML = '';

			results.forEach(result => {
				const resultDiv = document.createElement('div');
				resultDiv.classList.add('result');

				const title = document.createElement('a');
				title.href = result.link;
				title.textContent = result.title;

				const snippet = document.createElement('p');
				snippet.textContent = result.snippet;

				resultDiv.appendChild(title);
				resultDiv.appendChild(snippet);

				resultsDiv.appendChild(resultDiv);
			});
		}

		function addToHistory(query) {
			const history = getHistory().filter(q => q.toLowerCase() !== query.toLowerCase());
			history.unshift(query);
			localStorage.setItem('searchHistory', JSON.stringify(history.slice(0, 10)));
		}

		function getHistory() {
			return JSON.parse(localStorage.getItem('searchHistory') || '[]');
		}

		function showSuggestions(filter) {
			const matches = getHistory()
				.filter(q => q.toLowerCase().includes((filter || '').toLowerCase()))
				.slice(0, 5); // show max 5 suggestions
			const box = document.getElementById('suggestions');

			if (matches.length === 0) { hideSuggestions(); return; }

			box.innerHTML = '';
			matches.forEach(q => {
				const item = document.createElement('div');
				item.classList.add('suggestion-item');

				const icon = document.createElement('span');
				icon.className = 'suggestion-icon';
				icon.textContent = '🕐';

				const text = document.createElement('span');
				text.className = 'suggestion-text';
				text.textContent = q;

				const deleteBtn = document.createElement('span');
				deleteBtn.className = 'suggestion-delete';
				deleteBtn.textContent = '×';
				deleteBtn.addEventListener('mousedown', (e) => {
					e.preventDefault();  // dropdown stays open
					e.stopPropagation();
					deleteFromHistory(q);
					showSuggestions(queryInput.value);
				});

				item.appendChild(icon);
				item.appendChild(text);
				item.appendChild(deleteBtn);

				item.addEventListener('mousedown', () => {
					queryInput.value = q;
					hideSuggestions();
					search();
				});
				box.appendChild(item);
			});
			box.style.display = 'block';
			queryInput.classList.add('suggestions-open');
		}

		function hideSuggestions() {
			document.getElementById('suggestions').style.display = 'none';
			queryInput.classList.remove('suggestions-open');
		}

		function deleteFromHistory(query) {
			const updated = getHistory().filter(q => q.toLowerCase() !== query.toLowerCase());
			localStorage.setItem('searchHistory', JSON.stringify(updated));
		}

		// Restore last search results when navigating back
		(function restoreFromSession() {
			const navType = performance.getEntriesByType('navigation')[0]?.type;
			if (navType !== 'back_forward') return;

			const savedQuery = sessionStorage.getItem('lastQuery');
			const savedResults = sessionStorage.getItem('lastResults');
			if (savedQuery && savedResults) {
				document.getElementById('query').value = savedQuery;
				searchResults = JSON.parse(savedResults);
				displayResults(searchResults);
			}
		})();

		function downloadResults() {
 			if (searchResults.length === 0) {
			alert('Nic ke stažení.');
 				return;
			}

			let csvContent = "data:text/csv;charset=utf-8,";
			csvContent += "Title,Link,Snippet\n";

			searchResults.forEach(result => {
				const title = result.title.replace(/"/g, '""');
				const link = result.link;
				const snippet = result.snippet.replace(/"/g, '""');
				csvContent += `"${title}","${link}","${snippet}"\n`;
			});

			const encodedUri = encodeURI(csvContent);
			const link = document.createElement('a');
			link.setAttribute('href', encodedUri);
			link.setAttribute('download', 'search_results.csv');
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
        }
    </script>
</body>
</html>
