<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="styles.css" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title>Vstupní test</title>
</head>

<body>
    <h1>PRAKTICKÁ ČÁST</h1>
	<div class="search-container">
		<input type="text" id="query" placeholder="Search...">
		<span class="search-icon" onclick="search()">&#128269;</span>
	</div>
	<div class="buttons">
		<button onclick="downloadResults()">Download Results</button>
	</div>

    <div id="results"></div>

    <script>
        let searchResults = [];

        document.getElementById('query').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                search();
            }
        });

        async function search() {
            const query = document.getElementById('query').value;
            const apiKey = 'AIzaSyDG5cCME4HUeLchtLCSbONQOj2R6z_BZ7U'; // Replace with your API key
            const cx = '754f4c3b5d42a41f3'; // Replace with your Search Engine ID

            const url = `https://www.googleapis.com/customsearch/v1?key=${apiKey}&cx=${cx}&q=${query}`;

            const response = await fetch(url);
            const data = await response.json();

            searchResults = data.items;
            displayResults(data.items);
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            results.forEach(result => {
                const resultDiv = document.createElement('div');
                resultDiv.classList.add('result');

                const title = document.createElement('a');
                title.href = result.link;
                title.textContent = result.title;

                const snippet = document.createElement('p');
                snippet.textContent = result.snippet;

                resultDiv.appendChild(title);
                resultDiv.appendChild(snippet);

                resultsDiv.appendChild(resultDiv);
            });
        }

        function downloadResults() {
            if (searchResults.length === 0) {
                alert('No results to download.');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Title,Link,Snippet\n";

            searchResults.forEach(result => {
                const title = result.title.replace(/"/g, '""'); // Escape double quotes
                const link = result.link;
                const snippet = result.snippet.replace(/"/g, '""'); // Escape double quotes
                csvContent += `"${title}","${link}","${snippet}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement('a');
            link.setAttribute('href', encodedUri);
            link.setAttribute('download', 'search_results.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
